<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tim Kami</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #2c92ff, #6dd5fa);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            width: 400px;
            animation: fadeIn 1s ease;
        }

        h2 {
            margin-bottom: 10px;
            color: #333;
        }

        p {
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;
        }

        img {
            width: 100%;
            border-radius: 15px;
            transition: 0.4s;
        }

        img:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .caption {
            margin-top: 15px;
            font-weight: bold;
            color: #2c92ff;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>👥 Tim Kami</h2>
    <p>
        Kelompok Kerja Ter gg sedunia, gak ada yang bisa ngalahin WLEEEEEEEE
    </p>

    <img src="WhatsApp Image 2026-04-24 at 08.18.03.jpeg" alt="Foto Kelompok">

    <div class="caption">
        ✨ Bersama Kami Berkarya, Bersama Kami Berkembang ✨
    </div>
</div>

</body>
</html>
